<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagenic - Timeless Memories</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Styling Slide */
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
            z-index: 1;
        }

        .slide.active {
            opacity: 1;
            z-index: 2;
        }

        /* Navigasi di samping kanan */
        .slider-nav {
            position: absolute;
            right: 5%;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Efek Hover Arrow */
        .btn-next i {
            transition: transform 0.3s ease;
            display: inline-block;
        }

        .btn-next:hover i {
            transform: translateX(10px);
        }

        .hero-content {
            position: absolute;
            left: 10%;
            top: 50%;
            transform: translateY(-50%);
            z-index: 5;
        }
    </style>
</head>
<body>

    <section class="hero" id="hero-slider">
        <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1920&q=80');"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=1920&q=80');"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=1920&q=80');"></div>
    
        <div class="hero-content">
            <h1 class="display-3 fw-bold text-white">Capturing Moments</h1>
        </div>
    
        <div class="slider-nav text-white">
            <div id="current-num" class="mb-4 fs-4 fw-light">01</div>
            <div class="mb-4 btn-next" style="cursor: pointer;">
                <i class="bi bi-arrow-right fs-1"></i>
            </div>
            <div id="total-num" class="fs-6 opacity-50">03</div>
        </div>
    </section>

    <footer class="footer-main">
        <div class="container">
            <div class="row">
                <div class="col-md-2 col-12">
                    <a href="index.html" class="footer-link">Home</a>
                    <a href="about.html" class="footer-link">About</a>
                    <a href="#" class="footer-link">Portfolio</a>
                </div>
                <div class="col-md-2 col-12">
                    <a href="order-works.html" class="footer-link">Other Works</a>
                    <a href="blog.html" class="footer-link">Family</a>
                    <a href="contact-us.html" class="footer-link">Contact Us</a>
                </div>
                <div class="col-md-8 text-end d-none d-md-block">
                    <a href="#" class="text-dark"><i class="bi bi-arrow-up"></i></a>
                </div>
            </div>
            <div class="mt-5 pt-4 border-top d-flex justify-content-between align-items-md-center align-items-start flex-md-row flex-column gap-md-0 gap-2">
                <div class="copyright">All content Copyright © 2026 Kamisupport</div>
                <div class="social-icons">
                    <a href="#"><i class="bi bi-twitter-x"></i></a>
                    <a href="#"><i class="bi bi-instagram"></i></a>
                    <a href="#"><i class="bi bi-tiktok"></i></a>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const slides = document.querySelectorAll('.slide');
            const currentNumDisplay = document.getElementById('current-num');
            const totalNumDisplay = document.getElementById('total-num');
            const nextBtn = document.querySelector('.btn-next');
            
            let currentIndex = 0;
            const totalSlides = slides.length;

            // Set angka total secara otomatis
            totalNumDisplay.innerText = totalSlides.toString().padStart(2, '0');

            function updateSlider(index) {
                // Hapus class active dari slide lama
                slides.forEach(slide => slide.classList.remove('active'));
                
                // Tambah class active ke slide baru
                slides[index].classList.add('active');
                
                // Update angka (index + 1 agar tidak mulai dari 0)
                currentNumDisplay.innerText = (index + 1).toString().padStart(2, '0');
            }

            nextBtn.addEventListener('click', function() {
                currentIndex++;
                
                // Jika sampai di slide terakhir, balik ke awal
                if (currentIndex >= totalSlides) {
                    currentIndex = 0;
                }
                
                updateSlider(currentIndex);
            });

            // Opsional: Auto Play setiap 5 detik
            setInterval(() => {
                nextBtn.click();
            }, 5000);
        });
    </script>
</body>
</html>
